<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>MotoTrack GPS</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <style>
    /* Estilos base existentes */
    :root { --or: #FF6B00; --dk: #080808; --tx: #EBEBEB; --mu: #555; --rd: #FF3355; }
    body { background:var(--dk); color:var(--tx); font-family:'Rajdhani',sans-serif; margin:0; display:flex; flex-direction:column; align-items:center; }
    
    /* Nueva Ventana de Ayuda para Permisos */
    #modal-ayuda {
      display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9);
      z-index:100; padding:20px; flex-direction:column; justify-content:center;
    }
    .ayuda-card { background:#1A1A1A; padding:20px; border-radius:15px; border:1px solid var(--or); text-align:center; }
    .ayuda-pasos { text-align:left; margin:15px 0; font-size:14px; }
    .btn-cerrar { background:var(--or); color:#000; border:none; padding:10px 20px; border-radius:8px; font-weight:bold; cursor:pointer; }
    
    /* ... (resto de tus estilos de mototrack-peerjs.html) ... */
    .btn-big { width:100%; padding:17px; border-radius:13px; border:none; font-family:'Orbitron',monospace; font-size:14px; font-weight:700; cursor:pointer; margin-top:10px;}
    .go { background:var(--or); color:#000; }
  </style>
</head>
<body>

<div id="modal-ayuda">
  <div class="ayuda-card">
    <h3>⚠️ GPS Bloqueado</h3>
    <div class="ayuda-pasos">
      <p>1. Toca el icono del <b>candado 🔒</b> o los <b>ajustes</b> junto a la dirección web.</p>
      <p>2. Busca <b>"Ubicación"</b> y cámbialo a <b>"Permitir"</b>.</p>
      <p>3. Recarga la página para activar el rastreo.</p>
    </div>
    <button class="btn-cerrar" onclick="cerrarAyuda()">ENTENDIDO</button>
  </div>
</div>

<div class="page active" id="pg-moto" style="padding:20px; width:100%; max-width:400px;">
  <h2 style="color:var(--or)">Panel Repartidor</h2>
  <div id="m-status" style="margin:10px 0; font-size:12px; color:var(--mu);">Estado: Esperando acción...</div>
  <button class="btn-big go" onclick="intentarIniciarGPS()">🚀 INICIAR GPS</button>
</div>

<script>
// FUNCIÓN PARA VERIFICAR PERMISOS
async function intentarIniciarGPS() {
  if (!navigator.geolocation) {
    alert("Tu navegador no soporta GPS.");
    return;
  }

  try {
    // Intentamos obtener la posición para disparar el permiso del navegador
    navigator.geolocation.getCurrentPosition(
      (pos) => { 
        console.log("Permiso concedido");
        // Aquí llamarías a tu función original startGPS()
        document.getElementById('m-status').innerText = "🟢 GPS Activo";
      },
      (err) => {
        if (err.code === err.PERMISSION_DENIED) {
          mostrarAyuda();
        }
      }
    );
  } catch (e) {
    console.error(e);
  }
}

function mostrarAyuda() {
  document.getElementById('modal-ayuda').style.display = 'flex';
}

function cerrarAyuda() {
  document.getElementById('modal-ayuda').style.display = 'none';
}
</script>
</body>
</html>
